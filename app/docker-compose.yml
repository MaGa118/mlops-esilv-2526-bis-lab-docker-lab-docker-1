version: '3'
services:
  backend:
    image: gsalon/mlops-back:1.0
    environment:
      CURRENT_ENVIRONMENT: production
    # Removed port mapping to allow scaling
    # ports:
    #   - "5000:5000"
  
  frontend:
    image: gsalon/mlops-front:1.0
    environment:
      WS_BACK_URL: http://backend:5000
    ports:
      - "80:80"
    depends_on:
      - backend

